<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#06000f"/>
      <stop offset="100%" stop-color="#1a0038"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="40%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambientGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Ambient purple blob behind mic -->
  <ellipse cx="225" cy="200" rx="220" ry="180" fill="#7c3aed" opacity="0.10" filter="url(#ambientGlow)"/>

  <!-- Decorative rings -->
  <circle cx="225" cy="200" r="155" fill="none" stroke="#6d28d9" stroke-width="1" opacity="0.35"/>
  <circle cx="225" cy="200" r="205" fill="none" stroke="#4c1d95" stroke-width="1" opacity="0.22"/>
  <circle cx="225" cy="200" r="258" fill="none" stroke="#2e1065" stroke-width="1" opacity="0.14"/>

  <!-- Dots on ring (decorative) -->
  <circle cx="225" cy="45" r="4" fill="#a855f7" opacity="0.6"/>
  <circle cx="370" cy="108" r="3" fill="#818cf8" opacity="0.5"/>
  <circle cx="370" cy="292" r="3" fill="#818cf8" opacity="0.5"/>
  <circle cx="225" cy="355" r="4" fill="#a855f7" opacity="0.6"/>
  <circle cx="80" cy="108" r="3" fill="#818cf8" opacity="0.5"/>
  <circle cx="80" cy="292" r="3" fill="#818cf8" opacity="0.5"/>

  <!-- MIC ICON -->
  <!-- Mic body glow -->
  <rect x="190" y="108" width="68" height="128" rx="34" fill="#a855f7" opacity="0.35" filter="url(#glow)"/>
  <!-- Mic body -->
  <rect x="190" y="108" width="68" height="128" rx="34" fill="url(#micGrad)" filter="url(#softGlow)"/>
  <!-- Mic grill lines -->
  <line x1="203" y1="137" x2="245" y2="137" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="200" y1="155" x2="248" y2="155" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="200" y1="173" x2="248" y2="173" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="200" y1="191" x2="248" y2="191" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="203" y1="209" x2="245" y2="209" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <!-- Mic arc -->
  <path d="M 152 236 Q 152 300 224 300 Q 296 300 296 236"
        fill="none" stroke="url(#micGrad)" stroke-width="7" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Mic stand -->
  <line x1="224" y1="300" x2="224" y2="340" stroke="url(#micGrad)" stroke-width="7" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Mic base -->
  <line x1="180" y1="340" x2="268" y2="340" stroke="url(#micGrad)" stroke-width="7" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- TITLE -->
  <text x="380" y="212"
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="108" font-weight="900" fill="url(#titleGrad)"
        letter-spacing="-4" filter="url(#softGlow)">flow-st8</text>

  <!-- Tagline -->
  <text x="384" y="265"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="23" fill="#c084fc" letter-spacing="0.8" opacity="0.95">
    Local voice-to-text for Windows  ·  Offline  ·  Private
  </text>

  <!-- Accent line under title -->
  <rect x="383" y="283" width="500" height="3" rx="2" fill="#7c3aed" opacity="0.55"/>

  <!-- WAVEFORM BARS (right side) -->
  <g filter="url(#softGlow)" opacity="0.92">
    <rect x="875"  y="186" width="16" height="28"  rx="8" fill="url(#waveGrad)"/>
    <rect x="897"  y="170" width="16" height="60"  rx="8" fill="url(#waveGrad)"/>
    <rect x="919"  y="148" width="16" height="104" rx="8" fill="url(#waveGrad)"/>
    <rect x="941"  y="165" width="16" height="70"  rx="8" fill="url(#waveGrad)"/>
    <rect x="963"  y="122" width="16" height="156" rx="8" fill="url(#waveGrad)"/>
    <rect x="985"  y="152" width="16" height="96"  rx="8" fill="url(#waveGrad)"/>
    <rect x="1007" y="106" width="16" height="188" rx="8" fill="url(#waveGrad)"/>
    <rect x="1029" y="130" width="16" height="140" rx="8" fill="url(#waveGrad)"/>
    <rect x="1051" y="152" width="16" height="96"  rx="8" fill="url(#waveGrad)"/>
    <rect x="1073" y="118" width="16" height="164" rx="8" fill="url(#waveGrad)"/>
    <rect x="1095" y="162" width="16" height="76"  rx="8" fill="url(#waveGrad)"/>
    <rect x="1117" y="143" width="16" height="114" rx="8" fill="url(#waveGrad)"/>
    <rect x="1139" y="174" width="16" height="52"  rx="8" fill="url(#waveGrad)"/>
    <rect x="1161" y="158" width="16" height="84"  rx="8" fill="url(#waveGrad)"/>
    <rect x="1183" y="186" width="16" height="28"  rx="8" fill="url(#waveGrad)"/>
  </g>

  <!-- Ambient glow behind waveform -->
  <ellipse cx="1040" cy="200" rx="220" ry="100" fill="#06b6d4" opacity="0.05" filter="url(#ambientGlow)"/>
</svg>
